services:
  - type: web
    name: tiktok-discord-bot
    runtime: node
    plan: free
    buildCommand: mkdir -p $HOME/bin && ln -sf $(command -v python3) $HOME/bin/python && export PATH="$HOME/bin:$PATH" && npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: DISCORD_TOKEN
        sync: false
      - key: MAX_FILE_SIZE_MB
        value: "10"
